services:
  - type: web
    name: I-m-
    runtime: node
    plan: free
    buildCommand: rm -f pnpm-lock.yaml pnpm-workspace.yaml && NODE_ENV=development pnpm install --no-frozen-lockfile && NODE_ENV=production pnpm run build
    startCommand: NODE_ENV=production node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: B2_APP_KEY
        sync: false
      - key: B2_BUCKET
        sync: false
      - key: B2_ENDPOINT
        sync: false
      - key: B2_KEY_ID
        sync: false
      - key: BINANCE_PAY_ID
        sync: false
      - key: USDT_TRC20_ADDRESS
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    headers:
      - path: /
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
