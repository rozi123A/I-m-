services:
  - type: web
    name: connective
    runtime: node
    plan: free
    buildCommand: NODE_ENV=development pnpm install --no-frozen-lockfile && NODE_ENV=production pnpm run build
    startCommand: NODE_ENV=production node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: NODE_ENV
        value: production
